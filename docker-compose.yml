services:
  postgres:
    image: postgres:18
    container_name: golangkanban-postgres
    environment:
      POSTGRES_DB: golangkanban
      POSTGRES_USER: golangkanban
      POSTGRES_PASSWORD: golangkanban
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golangkanban -d golangkanban"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
